<!DOCTYPE html>
<html>
<head>
    <title>Finance Table - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border: 1px solid #ddd;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border: 1px solid #797979;
            background-color: #fafafa;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 10px;
            background-color: #797979;
            color: white;
            border: 1px solid #797979;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #555;
            border-color: #555;
        }
        
        button:active {
            background-color: #222;
            border-color: #222;
        }
        
        .info-text {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-top: 20px;
        }
        
        .demo-users {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: left;
        }
        
        .demo-users p {
            margin: 8px 0;
            color: #666;
            font-size: 13px;
        }
        
        .demo-users strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Finance Data</h1>
        <div class="form-group">
            <label for="usernameInput">用户名</label>
            <input type="text" id="usernameInput" placeholder="输入用户名" onkeydown="if(event.keyCode === 13) document.getElementById('passwordInput').focus()">
        </div>
        <div class="form-group">
            <label for="passwordInput">密码</label>
            <input type="password" id="passwordInput" placeholder="输入密码" onkeydown="if(event.keyCode === 13) login()">
        </div>
        <div class="button-group">
            <button onclick="login()">登录</button>
        </div>
        <div class="info-text">每次关闭标签页后需要重新登录</div>
        <div class="author">
            
        </div>
    </div>
    <script>
        function login() {
            const username = document.getElementById('usernameInput').value;
            const password = document.getElementById('passwordInput').value;
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({username: username, password: password})
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    sessionStorage.setItem('username', result.username);
                    sessionStorage.setItem('userRole', result.role);
                    location.href = '/';
                } else {
                    alert('登录失败: ' + result.error);
                    document.getElementById('passwordInput').value = '';
                    document.getElementById('usernameInput').focus();
                }
            })
            .catch(error => {
                console.error(error);
                alert('登录出错');
            });
        }
    </script>
</body>
</html>
